<div class="bg-slate-900 text-white px-[24px] h-[64px] flex flex-row gap-4 items-center">
  <div class="flex flex-row w-1/3 gap-2 content-center">
    <mat-icon>book_5</mat-icon>
    <h1 class="p-0 text-lg font-stretch-extra-expanded font-medium">Library Backlog</h1>
  </div>

  <nav class="flex flex-row w-1/3 gap-4 content-center">
    <a
      routerLinkActive
      routerLink="home"
      #homeLink="routerLinkActive"
      [matButton]="homeLink.isActive ? 'filled' : 'tonal'"
      class="flex-none"
      >My Backlog</a
    >
    <a
      routerLinkActive
      routerLink="explore"
      #exploreLink="routerLinkActive"
      [matButton]="exploreLink.isActive ? 'filled' : 'tonal'"
      class="flex-none"
      >Explore</a
    >
    <a
      routerLinkActive
      routerLink="settings"
      #settingsLink="routerLinkActive"
      [matButton]="settingsLink.isActive ? 'filled' : 'tonal'"
      class="flex-none"
      >Settings</a
    >
  </nav>

  <div class="flex flex-row w-1/3 content-center justify-end">
    <div
      class="flex flex-row items-center cursor-pointer w-[36px] h-[50px]"
      [matMenuTriggerFor]="profileMenu"
    >
      <img src="assets/img/empty-user.png" class="w-[36px] h-[36px] object-cover rounded-full" />
    </div>

    <mat-menu #profileMenu="matMenu">
      <div class="p-3 flex flex-col">
        <h1 class="text-lg">{{ loggedUser.name }}</h1>
        <span class="text-gray-600">{{ loggedUser.key }}</span>
      </div>

      @for (option of userOptions; track option.label) {
        <button mat-menu-item>
          <mat-icon>{{ option.icon }}</mat-icon>
          <span>{{ option.label }}</span>
        </button>
      }
    </mat-menu>
  </div>
</div>

<div class="w-full overflow-y-auto" style="height: calc(100vh - 64px)">
  <router-outlet />
</div>
